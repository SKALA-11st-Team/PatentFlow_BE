apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: team11-patentflow-be-ai-reports-pvc
  namespace: patentflow
  labels:
    app: team11-patentflow-be
spec:
  # INFRA-03: AI 리포트 파일 영속화. 다중 replica(INFRA-09)에서 공유하려면 RWX(EFS 등)가 필요하다.
  # EFS CSI가 없는 클러스터라면 accessModes를 ReadWriteOnce로 두고 deployment replicas를 1로 제한하거나,
  # 권장안으로 S3/MinIO 객체 저장(INFRA-F5)으로 이전해 영속성+스케일아웃을 동시에 충족한다.
  accessModes:
    - ReadWriteMany
  storageClassName: efs-sc   # 클러스터의 EFS CSI 스토리지클래스명으로 교체(미가용 시 gp2 + RWO + replica=1).
  resources:
    requests:
      storage: 5Gi
