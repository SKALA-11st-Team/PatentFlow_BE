apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: team11-patentflow-be-hpa
  namespace: patentflow
  labels:
    app: team11-patentflow-be
# INFRA-09: CPU/메모리 사용률 기반 자동 확장. 클러스터에 metrics-server가 설치돼 있어야 동작한다.
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: team11-patentflow-be-deployment
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 120
