apiVersion: v1
kind: ConfigMap
metadata:
  name: team11-patentflow-be-config
  namespace: patentflow
data:
  SPRING_PROFILES_ACTIVE: "demo"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://team11-patentflow-postgres-svc:5432/patentflow?currentSchema=patentflow"
  SPRING_DATASOURCE_USERNAME: "patentflow"
  PATENTFLOW_DB_SCHEMA: "patentflow"
  PATENTFLOW_CORS_ALLOWED_ORIGINS: "https://patentflow.live,http://localhost:5173"
  # Gmail OAuth2 메일 연동(시크릿 아님 — client-id/secret만 secret.yaml). 운영 토폴로지 URL을
  # 명시하지 않으면 application.yml의 localhost 기본값으로 떨어져 연동이 실패한다.
  # redirect-uri는 Google Cloud Console > 승인된 리디렉션 URI와 반드시 일치해야 함.
  GOOGLE_OAUTH2_REDIRECT_URI: "https://api.patentflow.live/api/v1/admin/settings/mail/oauth2/google/callback"
  GOOGLE_OAUTH2_FRONTEND_URI: "https://patentflow.live/admin/settings"
  PATENTFLOW_AGENT_URL: "http://team11-patentflow-agent-svc:8000"
  PATENTFLOW_AI_REPORT_STORAGE_DIR: "/app/storage/ai-reports"
  PATENTFLOW_COOKIE_SECURE: "true"
  PATENTFLOW_COOKIE_SAME_SITE: "None"
  # SEC-12(BE-07): 운영에서 swagger/api-docs 전면 비활성화 — ADMIN 게이트에 더한 심층 방어.
  SPRINGDOC_ENABLED: "false"
  # 인증/세션 공유·영속 스토어(토큰 폐기·로그인 락아웃). Redis는 BE와 별도 StatefulSet 파드
  # (redis-statefulset.yaml)로 뜨고 ClusterIP 서비스로 접근한다. 멀티레플리카·재시작에도 공유·영속.
  PATENTFLOW_REDIS_ENABLED: "true"
  REDIS_HOST: "team11-patentflow-redis-svc"
  REDIS_PORT: "6379"
