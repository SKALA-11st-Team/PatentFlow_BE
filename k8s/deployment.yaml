apiVersion: apps/v1
kind: Deployment
metadata:
  name: team11-patentflow-be-deployment
  namespace: patentflow
  labels:
    app: team11-patentflow-be
spec:
  # INFRA-09: 다중 replica(무중단 배포·노드 드레인 내성). JWT stateless + Redis 외부화로 BE는 수평 확장 가능.
  # HPA(hpa.yaml)가 실제 replica 수를 관리하며, AI 리포트 저장은 RWX(EFS)/S3여야 replica 간 정합이 유지된다(INFRA-03).
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: team11-patentflow-be
  template:
    metadata:
      labels:
        app: team11-patentflow-be
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: team11-patentflow-be
          image: harbor.example.com/patentflow/team11-patentflow-be:placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: team11-patentflow-be-config
            - secretRef:
                name: team11-patentflow-be-secret
          # INFRA-07: readiness=의존성(db) 포함 → 트래픽 차단만, liveness=프로세스 생존(ping)만 → 의존성 장애로 불필요 재시작 방지.
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          # AIREPORT-03: AI 리포트 마크다운은 DB 컬럼에 영속되고 파일 저장은 폐지됨 → 공유 볼륨(PVC) 불필요.
          # 덕분에 멀티레플리카(INFRA-09)가 RWX/EFS 없이도 정합을 유지한다.
