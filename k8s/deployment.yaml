apiVersion: apps/v1
kind: Deployment
metadata:
  name: team11-patentflow-be-deployment
  namespace: patentflow
  labels:
    app: team11-patentflow-be
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: team11-patentflow-be
  template:
    metadata:
      labels:
        app: team11-patentflow-be
    spec:
      imagePullSecrets:
        - name: harbor-regcred
      containers:
        - name: team11-patentflow-be
          image: harbor.example.com/patentflow/team11-patentflow-be:placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: team11-patentflow-be-config
            - secretRef:
                name: team11-patentflow-be-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
