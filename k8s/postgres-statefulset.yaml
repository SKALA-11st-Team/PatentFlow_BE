apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: 11-team-patentflow-postgres-statefulset
  namespace: patentflow
  labels:
    app: 11-team-patentflow-postgres
spec:
  serviceName: 11-team-patentflow-postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: 11-team-patentflow-postgres
  template:
    metadata:
      labels:
        app: 11-team-patentflow-postgres
    spec:
      containers:
        - name: postgres
          image: ankane/pgvector:v0.5.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          envFrom:
            - secretRef:
                name: 11-team-patentflow-postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
