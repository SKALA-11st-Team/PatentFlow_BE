apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: team11-patentflow-redis-statefulset
  namespace: patentflow
  labels:
    app: team11-patentflow-redis
spec:
  serviceName: team11-patentflow-redis-svc
  replicas: 1
  selector:
    matchLabels:
      app: team11-patentflow-redis
  template:
    metadata:
      labels:
        app: team11-patentflow-redis
    spec:
      # 비특권 실행(redis 공식 이미지의 redis uid 999)
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          # AOF 영속(appendonly) — PVC(redis-data)에 기록되어 파드 재시작·새벽 종료에도
          # 토큰 폐기/락아웃 키가 유지된다(운영 전제: PVC는 항상 유지).
          args:
            - redis-server
            - --appendonly
            - "yes"
            - --dir
            - /data
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
