spring:
  datasource:
    url: jdbc:h2:mem:patentflow-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false

patentflow:
  auth:
    jwt-secret: test-patentflow-jwt-secret-change-me-please-32bytes
    access-token-expiration-seconds: 3600
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  lookup:
    kipris:
      base-url: http://plus.kipris.or.kr
      service-path: /kipo-api/kipi/patUtiModInfoSearchSevice
      bibliography-operation: getBibliographyDetailInfoSearch
      application-search-operation:
      service-key:
      service-keys:
    google-patents:
      enabled: false
      base-url: https://patents.google.com
