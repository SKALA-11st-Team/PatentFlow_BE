spring:
  application:
    name: PatentFlow
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/patentflow?currentSchema=patentflow}
    username: ${SPRING_DATASOURCE_USERNAME:patentflow}
    password: ${SPRING_DATASOURCE_PASSWORD:patentflow}
  # 인증/세션 공유·영속 스토어. patentflow.redis.enabled=true일 때만 실제 사용한다(미사용 시 연결 안 함).
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2s
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ${PATENTFLOW_DB_SCHEMA:patentflow}
        hbm2ddl:
          create_namespaces: true
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 50MB    # 파일 하나당 최대 크기
      max-request-size: 50MB # 전체 요청의 최대 크기
server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        # INFRA-07: 관측성 — Prometheus 메트릭 스크레이프(/actuator/prometheus) 노출. (보안: actuator/**는 ROLE_ADMIN)
        include: health,info,prometheus
  endpoint:
    health:
      # INFRA-07: liveness/readiness 프로브 그룹 분리 — readiness는 의존성(db) 포함, liveness는 프로세스 생존(ping)만.
      probes:
        enabled: true
      group:
        liveness:
          include: ping
        readiness:
          include: readinessState,db
  health:
    mail:
      enabled: false
    # redis 비활성 시 헬스 인디케이터가 연결을 시도하지 않도록 동일 플래그로 끈다.
    redis:
      enabled: ${PATENTFLOW_REDIS_ENABLED:false}

patentflow:
  # 인증/세션 공유·영속 스토어(토큰 폐기·로그인 락아웃) 사용 여부. false면 인메모리(단일 인스턴스용)로 폴백.
  redis:
    enabled: ${PATENTFLOW_REDIS_ENABLED:false}
  # P6 BE-RATELIMIT: 인증 엔드포인트 IP+경로 요청 한도(초과 429). 멀티레플리카는 redis.enabled=true로 공유.
  ratelimit:
    enabled: ${PATENTFLOW_RATELIMIT_ENABLED:true}
    auth:
      limit: ${PATENTFLOW_RATELIMIT_AUTH_LIMIT:30}
      window-seconds: ${PATENTFLOW_RATELIMIT_AUTH_WINDOW_SECONDS:60}
  oauth2:
    google:
      # Google Cloud Console에 등록한 OAuth2 앱 자격증명
      # redirect-uri는 Google Cloud Console > 승인된 리디렉션 URI와 반드시 일치해야 함
      client-id: ${GOOGLE_OAUTH2_CLIENT_ID:}
      client-secret: ${GOOGLE_OAUTH2_CLIENT_SECRET:}
      redirect-uri: ${GOOGLE_OAUTH2_REDIRECT_URI:http://localhost:8080/api/v1/admin/settings/mail/oauth2/google/callback}
      frontend-settings-uri: ${GOOGLE_OAUTH2_FRONTEND_URI:http://localhost:5173/admin/settings}
  bootstrap:
    admin:
      email: ${PATENTFLOW_BOOTSTRAP_ADMIN_EMAIL:${PATENTFLOW_BOOTSTRAP_ADMIN_USERNAME:}}
      password: ${PATENTFLOW_BOOTSTRAP_ADMIN_PASSWORD:}
      display-name: ${PATENTFLOW_BOOTSTRAP_ADMIN_DISPLAY_NAME:특허관리자}
    business:
      email: ${PATENTFLOW_BOOTSTRAP_BUSINESS_EMAIL:${PATENTFLOW_BOOTSTRAP_BUSINESS_USERNAME:}}
      password: ${PATENTFLOW_BOOTSTRAP_BUSINESS_PASSWORD:}
      department-id: ${PATENTFLOW_BOOTSTRAP_BUSINESS_DEPARTMENT_ID:DEPT-ICT}
      display-name: ${PATENTFLOW_BOOTSTRAP_BUSINESS_DISPLAY_NAME:사업부 데모 담당자}
  auth:
    jwt-secret: ${PATENTFLOW_JWT_SECRET:dev-patentflow-jwt-secret-change-me-please-32bytes}
    access-token-expiration-seconds: ${PATENTFLOW_JWT_EXPIRATION_SECONDS:3600}
    # 1209600 = 14일 — 리프레시 토큰 기본 유효 기간
    refresh-token-expiration-seconds: ${PATENTFLOW_REFRESH_TOKEN_EXPIRATION_SECONDS:1209600}
    max-login-failures: ${PATENTFLOW_MAX_LOGIN_FAILURES:5}
    login-lock-seconds: ${PATENTFLOW_LOGIN_LOCK_SECONDS:300}
    access-cookie-name: ${PATENTFLOW_ACCESS_COOKIE_NAME:patentflow_access}
    refresh-cookie-name: ${PATENTFLOW_REFRESH_COOKIE_NAME:patentflow_refresh}
    cookie-secure: ${PATENTFLOW_COOKIE_SECURE:false}
    cookie-same-site: ${PATENTFLOW_COOKIE_SAME_SITE:Lax}
    # 비어 있으면 host-only 쿠키(로컬). 크로스 서브도메인 배포에선 .patentflow.live 지정 (SPA가 XSRF-TOKEN 쿠키를 읽을 수 있게)
    cookie-domain: ${PATENTFLOW_COOKIE_DOMAIN:}
  cors:
    allowed-origins: ${PATENTFLOW_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  lookup:
    kipris:
      base-url: ${PATENTFLOW_KIPRIS_BASE_URL:http://plus.kipris.or.kr}
      service-path: ${PATENTFLOW_KIPRIS_SERVICE_PATH:/kipo-api/kipi/patUtiModInfoSearchSevice}
      bibliography-operation: ${PATENTFLOW_KIPRIS_BIBLIOGRAPHY_OPERATION:getBibliographyDetailInfoSearch}
      application-search-operation: ${PATENTFLOW_KIPRIS_APPLICATION_SEARCH_OPERATION:}
      pdf-path-operation: ${PATENTFLOW_KIPRIS_PDF_PATH_OPERATION:getPubFullTextInfoSearch}
      service-key: ${PATENTFLOW_KIPRIS_SERVICE_KEY:}
      service-keys: ${PATENTFLOW_KIPRIS_SERVICE_KEYS:}
    google-patents:
      enabled: ${PATENTFLOW_GOOGLE_PATENTS_ENABLED:true}
      base-url: ${PATENTFLOW_GOOGLE_PATENTS_BASE_URL:https://patents.google.com}
  ai-report:
    storage-dir: ${PATENTFLOW_AI_REPORT_STORAGE_DIR:storage/ai-reports}
  # MAIL-12: 한국 특허 공개전문 PDF를 KIPRIS에서 받아 S3에 캐시하고 presigned 다운로드 링크를
  # 메일에 싣는다. 비활성/미설정이면 모든 특허가 원문 URL로 폴백한다(무해 배포).
  pdf-storage:
    enabled: ${PATENTFLOW_PDF_STORAGE_ENABLED:false}
    bucket: ${PATENTFLOW_PDF_S3_BUCKET:}
    region: ${PATENTFLOW_PDF_S3_REGION:ap-northeast-2}
    key-prefix: ${PATENTFLOW_PDF_S3_KEY_PREFIX:patent-pdfs/}
    presign-ttl-days: ${PATENTFLOW_PDF_PRESIGN_TTL_DAYS:7}

springdoc:
  # SEC-12: 운영에서는 SPRINGDOC_ENABLED=false로 api-docs·swagger-ui를 전면 비활성화(ADMIN 게이트에 더한 심층 방어).
  api-docs:
    enabled: ${SPRINGDOC_ENABLED:true}
  swagger-ui:
    enabled: ${SPRINGDOC_ENABLED:true}
    path: /swagger-ui.html

agent:
  url: ${PATENTFLOW_AGENT_URL:http://patentflow-agent:8000}
