name: Deploy BE to EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: team11-patentflow-be
  KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'patentflow' }}
  SPRING_PROFILES_ACTIVE: ${{ vars.SPRING_PROFILES_ACTIVE || 'demo' }}
  SPRING_DATASOURCE_URL: ${{ vars.SPRING_DATASOURCE_URL || 'jdbc:postgresql://team11-patentflow-postgres-svc:5432/patentflow?currentSchema=patentflow' }}
  SPRING_DATASOURCE_USERNAME: ${{ vars.SPRING_DATASOURCE_USERNAME || 'patentflow' }}
  PATENTFLOW_DB_SCHEMA: ${{ vars.PATENTFLOW_DB_SCHEMA || 'patentflow' }}
  PATENTFLOW_CORS_ALLOWED_ORIGINS: ${{ vars.PATENTFLOW_CORS_ALLOWED_ORIGINS || 'https://patentflow.live' }}
  PATENTFLOW_AGENT_URL: ${{ vars.PATENTFLOW_AGENT_URL || 'http://team11-patentflow-agent-svc:8000' }}
  PATENTFLOW_AI_REPORT_STORAGE_DIR: /app/storage/ai-reports
  PATENTFLOW_COOKIE_SECURE: "true"
  PATENTFLOW_COOKIE_SAME_SITE: None
  BE_INGRESS_HOST: ${{ vars.BE_INGRESS_HOST || 'api.patentflow.example.com' }}
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
  AWS_PROFILE_NAME: ${{ vars.AWS_PROFILE_NAME || 'skala-student' }}

jobs:
  deploy:
    name: Build, push, and rollout
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required inputs
        env:
          HARBOR_REGISTRY_VALUE: ${{ secrets.HARBOR_REGISTRY }}
          HARBOR_PROJECT_VALUE: ${{ secrets.HARBOR_PROJECT }}
          HARBOR_USERNAME_VALUE: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD_VALUE: ${{ secrets.HARBOR_PASSWORD }}
          KUBE_CONFIG_VALUE: ${{ secrets.KUBE_CONFIG }}
          AWS_ACCESS_KEY_ID_VALUE: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_VALUE: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          SPRING_DATASOURCE_PASSWORD_VALUE: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          PATENTFLOW_JWT_SECRET_VALUE: ${{ secrets.PATENTFLOW_JWT_SECRET }}
        run: |
          missing=0
          for name in \
            HARBOR_REGISTRY_VALUE \
            HARBOR_PROJECT_VALUE \
            HARBOR_USERNAME_VALUE \
            HARBOR_PASSWORD_VALUE \
            KUBE_CONFIG_VALUE \
            AWS_ACCESS_KEY_ID_VALUE \
            AWS_SECRET_ACCESS_KEY_VALUE \
            SPRING_DATASOURCE_PASSWORD_VALUE \
            PATENTFLOW_JWT_SECRET_VALUE
          do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: ${name%_VALUE}" >&2
              missing=1
            fi
          done

          if [ "${BE_INGRESS_HOST}" = "api.patentflow.example.com" ]; then
            echo "BE_INGRESS_HOST is still the placeholder value." >&2
            missing=1
          fi

          if [ -n "${PATENTFLOW_JWT_SECRET_VALUE}" ] && [ "${#PATENTFLOW_JWT_SECRET_VALUE}" -lt 32 ]; then
            echo "PATENTFLOW_JWT_SECRET must be at least 32 characters." >&2
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Set image coordinates
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_REF }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure AWS profile for kubeconfig exec auth
        env:
          AWS_ACCESS_KEY_ID_VALUE: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_VALUE: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN_VALUE: ${{ secrets.AWS_SESSION_TOKEN }}
        run: |
          if [ -z "${AWS_ACCESS_KEY_ID_VALUE}" ] || [ -z "${AWS_SECRET_ACCESS_KEY_VALUE}" ]; then
            echo "AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY secrets are required because KUBE_CONFIG uses aws eks get-token." >&2
            exit 1
          fi

          mkdir -p "$HOME/.aws"
          {
            echo "[${AWS_PROFILE_NAME}]"
            echo "aws_access_key_id=${AWS_ACCESS_KEY_ID_VALUE}"
            echo "aws_secret_access_key=${AWS_SECRET_ACCESS_KEY_VALUE}"
            if [ -n "${AWS_SESSION_TOKEN_VALUE}" ]; then
              echo "aws_session_token=${AWS_SESSION_TOKEN_VALUE}"
            fi
          } > "$HOME/.aws/credentials"

          {
            echo "[profile ${AWS_PROFILE_NAME}]"
            echo "region=${AWS_REGION}"
            echo "output=json"
          } > "$HOME/.aws/config"

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          aws --version
          kubectl version --client=true
          kubectl config current-context

      - name: Check cluster prerequisites
        run: |
          kubectl get ingressclass alb
          kubectl get namespace "${KUBE_NAMESPACE}" >/dev/null 2>&1 || kubectl auth can-i create namespaces
          kubectl auth can-i create deployments.apps --namespace="${KUBE_NAMESPACE}"
          kubectl auth can-i create statefulsets.apps --namespace="${KUBE_NAMESPACE}"
          kubectl auth can-i create services --namespace="${KUBE_NAMESPACE}"
          kubectl auth can-i create ingresses.networking.k8s.io --namespace="${KUBE_NAMESPACE}"
          kubectl auth can-i create secrets --namespace="${KUBE_NAMESPACE}"
          kubectl auth can-i create configmaps --namespace="${KUBE_NAMESPACE}"

      - name: Prepare manifests
        run: |
          cp -R k8s /tmp/patentflow-k8s
          sed -i "s/name: patentflow/name: ${KUBE_NAMESPACE}/g" /tmp/patentflow-k8s/namespace.yaml
          sed -i "s/namespace: patentflow/namespace: ${KUBE_NAMESPACE}/g" /tmp/patentflow-k8s/*.yaml
          sed -i "s|api.patentflow.example.com|${BE_INGRESS_HOST}|g" /tmp/patentflow-k8s/ingress.yaml
          sed -i "s|harbor.example.com/patentflow/team11-patentflow-be:placeholder|${IMAGE_REF}|g" /tmp/patentflow-k8s/deployment.yaml

      - name: Apply namespace
        run: kubectl apply -f /tmp/patentflow-k8s/namespace.yaml

      - name: Apply Harbor image pull secret
        run: |
          kubectl create secret docker-registry harbor-regcred \
            --docker-server="${{ secrets.HARBOR_REGISTRY }}" \
            --docker-username="${{ secrets.HARBOR_USERNAME }}" \
            --docker-password="${{ secrets.HARBOR_PASSWORD }}" \
            --namespace="${KUBE_NAMESPACE}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply PostgreSQL secret
        run: |
          kubectl create secret generic team11-patentflow-postgres-secret \
            --namespace="${KUBE_NAMESPACE}" \
            --from-literal=POSTGRES_DB="patentflow" \
            --from-literal=POSTGRES_USER="${SPRING_DATASOURCE_USERNAME}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply PostgreSQL manifests
        run: |
          kubectl apply -f /tmp/patentflow-k8s/postgres-service.yaml
          kubectl apply -f /tmp/patentflow-k8s/postgres-statefulset.yaml
          kubectl delete pod --namespace="${KUBE_NAMESPACE}" -l app=team11-patentflow-postgres --ignore-not-found=true
          kubectl rollout status statefulset/team11-patentflow-postgres-statefulset --namespace="${KUBE_NAMESPACE}" --timeout=420s

      - name: Diagnose PostgreSQL rollout failure
        if: failure()
        run: |
          kubectl get statefulset,svc,pvc,pod --namespace="${KUBE_NAMESPACE}" -o wide
          kubectl describe statefulset/team11-patentflow-postgres-statefulset --namespace="${KUBE_NAMESPACE}" || true
          kubectl describe pod --namespace="${KUBE_NAMESPACE}" -l app=team11-patentflow-postgres || true
          kubectl logs --namespace="${KUBE_NAMESPACE}" -l app=team11-patentflow-postgres --all-containers --tail=200 || true

      - name: Apply app secret
        run: |
          kubectl create secret generic team11-patentflow-be-secret \
            --namespace="${KUBE_NAMESPACE}" \
            --from-literal=SPRING_DATASOURCE_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
            --from-literal=PATENTFLOW_JWT_SECRET="${{ secrets.PATENTFLOW_JWT_SECRET }}" \
            --from-literal=PATENTFLOW_BOOTSTRAP_ADMIN_USERNAME="${{ secrets.PATENTFLOW_BOOTSTRAP_ADMIN_USERNAME }}" \
            --from-literal=PATENTFLOW_BOOTSTRAP_ADMIN_PASSWORD="${{ secrets.PATENTFLOW_BOOTSTRAP_ADMIN_PASSWORD }}" \
            --from-literal=PATENTFLOW_BOOTSTRAP_ADMIN_DISPLAY_NAME="${{ secrets.PATENTFLOW_BOOTSTRAP_ADMIN_DISPLAY_NAME }}" \
            --from-literal=GMAIL_USERNAME="${{ secrets.GMAIL_USERNAME }}" \
            --from-literal=GMAIL_APP_PASSWORD="${{ secrets.GMAIL_APP_PASSWORD }}" \
            --from-literal=PATENTFLOW_KIPRIS_SERVICE_KEY="${{ secrets.PATENTFLOW_KIPRIS_SERVICE_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply app config
        run: |
          kubectl create configmap team11-patentflow-be-config \
            --namespace="${KUBE_NAMESPACE}" \
            --from-literal=SPRING_PROFILES_ACTIVE="${SPRING_PROFILES_ACTIVE}" \
            --from-literal=SPRING_DATASOURCE_URL="${SPRING_DATASOURCE_URL}" \
            --from-literal=SPRING_DATASOURCE_USERNAME="${SPRING_DATASOURCE_USERNAME}" \
            --from-literal=PATENTFLOW_DB_SCHEMA="${PATENTFLOW_DB_SCHEMA}" \
            --from-literal=PATENTFLOW_CORS_ALLOWED_ORIGINS="${PATENTFLOW_CORS_ALLOWED_ORIGINS}" \
            --from-literal=PATENTFLOW_AGENT_URL="${PATENTFLOW_AGENT_URL}" \
            --from-literal=PATENTFLOW_AI_REPORT_STORAGE_DIR="${PATENTFLOW_AI_REPORT_STORAGE_DIR}" \
            --from-literal=PATENTFLOW_COOKIE_SECURE="${PATENTFLOW_COOKIE_SECURE}" \
            --from-literal=PATENTFLOW_COOKIE_SAME_SITE="${PATENTFLOW_COOKIE_SAME_SITE}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f /tmp/patentflow-k8s/deployment.yaml
          kubectl apply -f /tmp/patentflow-k8s/service.yaml
          kubectl apply -f /tmp/patentflow-k8s/ingress.yaml

      - name: Rollout status
        run: kubectl rollout status deployment/team11-patentflow-be-deployment --namespace="${KUBE_NAMESPACE}" --timeout=180s

      - name: Diagnose backend rollout failure
        if: failure()
        run: |
          kubectl get deployment,replicaset,svc,ingress,pod --namespace="${KUBE_NAMESPACE}" -o wide
          kubectl describe deployment/team11-patentflow-be-deployment --namespace="${KUBE_NAMESPACE}" || true
          kubectl describe pod --namespace="${KUBE_NAMESPACE}" -l app=team11-patentflow-be || true
          kubectl logs --namespace="${KUBE_NAMESPACE}" -l app=team11-patentflow-be --all-containers --tail=300 || true
