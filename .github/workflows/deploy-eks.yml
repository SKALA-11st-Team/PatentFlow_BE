name: Deploy BE to EKS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: patentflow-be
  KUBE_NAMESPACE: ${{ vars.KUBE_NAMESPACE || 'patentflow' }}
  SPRING_PROFILES_ACTIVE: ${{ vars.SPRING_PROFILES_ACTIVE || 'demo' }}
  SPRING_DATASOURCE_URL: ${{ vars.SPRING_DATASOURCE_URL || 'jdbc:postgresql://patentflow-postgres:5432/patentflow?currentSchema=patentflow' }}
  SPRING_DATASOURCE_USERNAME: ${{ vars.SPRING_DATASOURCE_USERNAME || 'patentflow' }}
  PATENTFLOW_DB_SCHEMA: ${{ vars.PATENTFLOW_DB_SCHEMA || 'patentflow' }}
  PATENTFLOW_CORS_ALLOWED_ORIGINS: ${{ vars.PATENTFLOW_CORS_ALLOWED_ORIGINS || 'https://patentflow.live' }}
  PATENTFLOW_AGENT_URL: ${{ vars.PATENTFLOW_AGENT_URL || 'http://patentflow-agent:8000' }}
  PATENTFLOW_AI_REPORT_STORAGE_DIR: /app/storage/ai-reports
  PATENTFLOW_COOKIE_SECURE: "true"
  PATENTFLOW_COOKIE_SAME_SITE: None
  BE_INGRESS_HOST: ${{ vars.BE_INGRESS_HOST || 'api.patentflow.example.com' }}

jobs:
  deploy:
    name: Build, push, and rollout
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image coordinates
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_REF=${{ secrets.HARBOR_REGISTRY }}/${{ secrets.HARBOR_PROJECT }}/${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_REF }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Prepare manifests
        run: |
          cp -R k8s /tmp/patentflow-k8s
          sed -i "s/name: patentflow/name: ${KUBE_NAMESPACE}/g" /tmp/patentflow-k8s/namespace.yaml
          sed -i "s/namespace: patentflow/namespace: ${KUBE_NAMESPACE}/g" /tmp/patentflow-k8s/*.yaml
          sed -i "s|api.patentflow.example.com|${BE_INGRESS_HOST}|g" /tmp/patentflow-k8s/ingress.yaml
          sed -i "s|harbor.example.com/patentflow/patentflow-be:placeholder|${IMAGE_REF}|g" /tmp/patentflow-k8s/deployment.yaml

      - name: Apply namespace
        run: kubectl apply -f /tmp/patentflow-k8s/namespace.yaml

      - name: Apply Harbor image pull secret
        run: |
          kubectl create secret docker-registry harbor-regcred \
            --docker-server="${{ secrets.HARBOR_REGISTRY }}" \
            --docker-username="${{ secrets.HARBOR_USERNAME }}" \
            --docker-password="${{ secrets.HARBOR_PASSWORD }}" \
            --namespace="${KUBE_NAMESPACE}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply PostgreSQL secret
        run: |
          kubectl create secret generic patentflow-postgres-secret \
            --namespace="${KUBE_NAMESPACE}" \
            --from-literal=POSTGRES_DB="patentflow" \
            --from-literal=POSTGRES_USER="${SPRING_DATASOURCE_USERNAME}" \
            --from-literal=POSTGRES_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply PostgreSQL manifests
        run: |
          kubectl apply -f /tmp/patentflow-k8s/postgres-service.yaml
          kubectl apply -f /tmp/patentflow-k8s/postgres-statefulset.yaml
          kubectl rollout status statefulset/patentflow-postgres --namespace="${KUBE_NAMESPACE}" --timeout=180s

      - name: Apply app secret
        run: |
          kubectl create secret generic patentflow-be-secret \
            --namespace="${KUBE_NAMESPACE}" \
            --from-literal=SPRING_DATASOURCE_PASSWORD="${{ secrets.SPRING_DATASOURCE_PASSWORD }}" \
            --from-literal=PATENTFLOW_JWT_SECRET="${{ secrets.PATENTFLOW_JWT_SECRET }}" \
            --from-literal=PATENTFLOW_BOOTSTRAP_ADMIN_USERNAME="${{ secrets.PATENTFLOW_BOOTSTRAP_ADMIN_USERNAME }}" \
            --from-literal=PATENTFLOW_BOOTSTRAP_ADMIN_PASSWORD="${{ secrets.PATENTFLOW_BOOTSTRAP_ADMIN_PASSWORD }}" \
            --from-literal=PATENTFLOW_BOOTSTRAP_ADMIN_DISPLAY_NAME="${{ secrets.PATENTFLOW_BOOTSTRAP_ADMIN_DISPLAY_NAME }}" \
            --from-literal=GMAIL_USERNAME="${{ secrets.GMAIL_USERNAME }}" \
            --from-literal=GMAIL_APP_PASSWORD="${{ secrets.GMAIL_APP_PASSWORD }}" \
            --from-literal=PATENTFLOW_KIPRIS_SERVICE_KEY="${{ secrets.PATENTFLOW_KIPRIS_SERVICE_KEY }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply app config
        run: |
          kubectl create configmap patentflow-be-config \
            --namespace="${KUBE_NAMESPACE}" \
            --from-literal=SPRING_PROFILES_ACTIVE="${SPRING_PROFILES_ACTIVE}" \
            --from-literal=SPRING_DATASOURCE_URL="${SPRING_DATASOURCE_URL}" \
            --from-literal=SPRING_DATASOURCE_USERNAME="${SPRING_DATASOURCE_USERNAME}" \
            --from-literal=PATENTFLOW_DB_SCHEMA="${PATENTFLOW_DB_SCHEMA}" \
            --from-literal=PATENTFLOW_CORS_ALLOWED_ORIGINS="${PATENTFLOW_CORS_ALLOWED_ORIGINS}" \
            --from-literal=PATENTFLOW_AGENT_URL="${PATENTFLOW_AGENT_URL}" \
            --from-literal=PATENTFLOW_AI_REPORT_STORAGE_DIR="${PATENTFLOW_AI_REPORT_STORAGE_DIR}" \
            --from-literal=PATENTFLOW_COOKIE_SECURE="${PATENTFLOW_COOKIE_SECURE}" \
            --from-literal=PATENTFLOW_COOKIE_SAME_SITE="${PATENTFLOW_COOKIE_SAME_SITE}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f /tmp/patentflow-k8s/deployment.yaml
          kubectl apply -f /tmp/patentflow-k8s/service.yaml
          kubectl apply -f /tmp/patentflow-k8s/ingress.yaml

      - name: Rollout status
        run: kubectl rollout status deployment/patentflow-be --namespace="${KUBE_NAMESPACE}" --timeout=180s
