services:
  11-team-patentflow-be-svc:
    build: .
    container_name: 11-team-patentflow-be
    ports:
      - "8080:8080"
    env_file:
      - path: ./.env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://11-team-patentflow-postgres-svc:5432/patentflow?currentSchema=patentflow
      SPRING_DATASOURCE_USERNAME: patentflow
      SPRING_DATASOURCE_PASSWORD: patentflow
      PATENTFLOW_DB_SCHEMA: patentflow
      PATENTFLOW_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174
      PATENTFLOW_AGENT_URL: http://11-team-patentflow-agent-svc:8000
      PATENTFLOW_AI_REPORT_STORAGE_DIR: /app/storage/ai-reports
    volumes:
      - ai-report-storage:/app/storage/ai-reports
    depends_on:
      11-team-patentflow-postgres-svc:
        condition: service_healthy

  11-team-patentflow-agent-svc:
    build: ../PatentFlow_Agent
    container_name: 11-team-patentflow-agent
    ports:
      - "8000:8000"
    env_file:
      - path: ../PatentFlow_Agent/.env
        required: false
    environment:
      PGVECTOR_DATABASE_URL: postgresql://patentflow:patentflow@11-team-patentflow-postgres-svc:5432/patentflow?options=-csearch_path%3Dpatentflow%2Cpublic
      UNIFIED_API_BASE_URL: http://11-team-patentflow-be-svc:8080
    depends_on:
      11-team-patentflow-postgres-svc:
        condition: service_healthy

  11-team-patentflow-postgres-svc:
    image: ankane/pgvector:v0.5.1
    container_name: 11-team-patentflow-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: patentflow
      POSTGRES_USER: patentflow
      POSTGRES_PASSWORD: patentflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patentflow -d patentflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
  ai-report-storage:
