services:
  patentflow-api:
    build: .
    container_name: patentflow-api
    ports:
      - "8080:8080"
    env_file:
      - path: ./.env
        required: false
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/patentflow
      SPRING_DATASOURCE_USERNAME: patentflow
      SPRING_DATASOURCE_PASSWORD: patentflow
      PATENTFLOW_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      PATENTFLOW_AGENT_URL: http://patentflow-agent:8000
      PATENTFLOW_AI_REPORT_STORAGE_DIR: /app/storage/ai-reports
    volumes:
      - ai-report-storage:/app/storage/ai-reports
    depends_on:
      postgres:
        condition: service_healthy

  patentflow-agent:
    build: ../PatentFlow_Agent
    container_name: patentflow-agent
    ports:
      - "8000:8000"
    env_file:
      - path: ../PatentFlow_Agent/.env
        required: false
    environment:
      PGVECTOR_DATABASE_URL: postgresql://patentflow:patentflow@postgres:5432/patentflow
      UNIFIED_API_BASE_URL: http://patentflow-api:8080
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: ankane/pgvector:v0.5.1
    container_name: patentflow-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: patentflow
      POSTGRES_USER: patentflow
      POSTGRES_PASSWORD: patentflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patentflow -d patentflow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
  ai-report-storage:
